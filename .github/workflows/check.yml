name: Check

on:
  pull_request:
  push:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  shell:
    name: Shell quality gate
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install shell tools
        run: |
          sudo apt-get update
          sudo apt-get install -y bats shellcheck shfmt

      - name: Run local check gate
        run: ./tools/check.sh
